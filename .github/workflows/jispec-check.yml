name: JiSpec Check

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate-protocol:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run JiSpec protocol checks
        run: npm run check:jispec
